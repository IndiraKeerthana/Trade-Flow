<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="wave1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="wave2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052CC;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="wave3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="wave4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Beautiful Layered Static Waves with Dynamic Wave Feel -->
  <g id="mark" filter="url(#softShadow)">
    <!-- Wave 1 - Darkest (back) -->
    <path d="M 8 48 Q 18 35 28 38 Q 38 42 48 35 Q 58 28 65 42 Q 70 50 62 58 Q 50 68 38 62 Q 26 56 15 62 Q 8 65 8 58 Z" 
          fill="url(#wave1Gradient)"/>
    
    <!-- Wave 2 - Medium Dark -->
    <path d="M 12 54 Q 22 42 32 44 Q 42 46 52 40 Q 62 34 68 48 Q 72 56 64 62 Q 52 70 40 65 Q 28 60 18 66 Q 12 69 12 60 Z" 
          fill="url(#wave2Gradient)"/>
    
    <!-- Wave 3 - Medium Light -->
    <path d="M 16 58 Q 26 48 36 50 Q 46 52 56 46 Q 66 40 72 52 Q 75 58 68 64 Q 56 70 44 66 Q 32 62 22 68 Q 16 71 16 62 Z" 
          fill="url(#wave3Gradient)"/>
    
    <!-- Wave 4 - Lightest (front) -->
    <path d="M 20 60 Q 30 52 40 54 Q 50 56 60 50 Q 70 44 76 56 Q 78 62 70 68 Q 58 74 46 70 Q 34 66 26 72 Q 20 74 20 66 Z" 
          fill="url(#wave4Gradient)"/>
    
    <!-- White highlight for sparkle -->
    <ellipse cx="58" cy="42" rx="6" ry="4" fill="#FFFFFF" opacity="0.5"/>
    
    <!-- Additional white accent for dynamic feel -->
    <ellipse cx="45" cy="50" rx="4" ry="3" fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Brand Name: TradeFlow -->
  <text x="95" y="62" font-family="'Times New Roman', serif" font-size="56" font-weight="700" fill="#2E6DB6" letter-spacing="-0.5">TradeFlow</text>
</svg>
